name: Grabador de Historial SanLeon

on:
  schedule:
    # Ejecuta cada 5 minutos exactamente
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  actualizar-historial:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests pytz

      - name: Ejecutar Script de Grabación
        env:
          ZT_API_TOKEN: ${{ secrets.ZT_API_TOKEN }}
          ZT_NETWORK_ID: ${{ secrets.ZT_NETWORK_ID }}
        run: python record_history.py  # Asegúrate que este sea el nombre de tu script

      - name: Persistencia y Sincronización (CRÍTICO)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Sincroniza antes de subir para evitar el error de "Pérdida de Información"
          git pull --rebase origin main 
          git add historial_conexiones.json
          # Solo hace commit si hay cambios reales
          git diff --quiet && git diff --staged --quiet || git commit -m "Sincronización automática: $(date)"
          git push origin main
