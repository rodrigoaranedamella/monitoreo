name: ZeroTier Monitor DB

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install requests pandas supabase pytz
      - name: Run
        env:
          ZT_API_TOKEN: ${{ secrets.ZT_API_TOKEN }}
          ZT_NETWORK_ID: ${{ secrets.ZT_NETWORK_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -u worker.py # El '-u' fuerza a Python a soltar los datos a la BDD de inmediato
